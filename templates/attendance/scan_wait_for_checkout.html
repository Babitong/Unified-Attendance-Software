{% load static %}

<html>
  <head>
    <title>Wait</title>
    <link rel="stylesheet" href="{% static 'css/checked.css' %} " />
  </head>
  <body>
    {% block content %}
    <div class="checkin-wrapper">
      <div class="checkin-card">
        <div class="icon">🤦‍♂️</div>

        <h2>Not yet time, {{ user.get_full_name|default:user.username }}</h2>

        <p class="message">
          Sorry, but you have already checked in. Please wait until the end of the day to check out.
        </p>

        <a href="{% url 'employee_dashboard' %}" class="btn">
          Return to your dashboard
        </a>
      </div>
    </div>
    {% endblock %}
  </body>
</html>
