{% load static %}

<html>
  <head>
    <title>Already|Checked-Out</title>
    <link rel="stylesheet" href="{% static 'css/checked.css' %} " />
  </head>
  <body>
    {% block content %}
    <div class="checkin-wrapper">
      <div class="checkin-card">
        <div class="icon">🎉🎉🎉🎉🎉</div>

        <h2>Bravo, {{ user.get_full_name|default:user.username }}</h2>

        <p class="message">Already done for the day</p>

        <a href="{% url 'employee_dashboard' %}" class="btn">
          Return to your dashboard
        </a>
      </div>
    </div>
    {% endblock %}
  </body>
</html>
